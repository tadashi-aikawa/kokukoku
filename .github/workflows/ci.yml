name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v5

      - name: Install test dependencies
        run: luarocks install busted

      - name: Run tests
        run: busted

      - name: Build Spoon distribution
        run: ./scripts/build_spoon_dist.sh

      - name: Validate Spoon distribution
        run: ./scripts/validate_spoon_dist.sh

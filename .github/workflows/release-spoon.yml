name: Release Spoon Distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Spoon distribution
        run: ./scripts/build_spoon_dist.sh

      - name: Validate Spoon distribution
        run: ./scripts/validate_spoon_dist.sh

      - name: Publish to spoons branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: spoons
          publish_dir: ./dist
          force_orphan: true
